{% extends 'scanner/base.html' %}

{% block title %}Verify 2FA{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto;">
    <div class="card">
        <h2 style="text-align: center;">Two-Factor Authentication</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 20px;">
            Please enter the 6-digit code from your authenticator app.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <input type="text" name="otp_token" placeholder="000000" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;" required>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Verify</button>
        </form>
    </div>
</div>
{% endblock %}
