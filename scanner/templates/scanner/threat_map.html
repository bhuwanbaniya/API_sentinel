{% extends 'scanner/base.html' %}
{% load static %}

{% block title %}Threat Map - API Sentinel{% endblock %}

{% block content %}
<!-- Include Leaflet CSS & JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<style>
    .threat-map-container {
        width: 100%;
        height: 600px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        margin-top: 20px;
        overflow: hidden;
    }
    
    #map {
        width: 100%;
        height: 100%;
        background: #0d1117; /* Dark background before tiles load */
    }

    /* Custom Pulsing Marker Animations */
    .pulse-marker {
        border-radius: 50%;
        box-shadow: 0 0 0 rgba(248, 81, 73, 0.4);
        animation: pulse 2s infinite;
    }
    
    .pulse-critical { background: #f85149; box-shadow: 0 0 0 rgba(248, 81, 73, 0.6); animation: pulse-crit 1.5s infinite; }
    .pulse-high { background: #f0ad4e; box-shadow: 0 0 0 rgba(240, 173, 78, 0.6); animation: pulse-high 2s infinite; }
    .pulse-medium { background: #58a6ff; box-shadow: 0 0 0 rgba(88, 166, 255, 0.6); animation: pulse-med 2s infinite; }
    .pulse-low { background: #8b949e; box-shadow: 0 0 0 rgba(139, 148, 158, 0.6); animation: pulse-low 3s infinite; }

    @keyframes pulse-crit { 0% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(248, 81, 73, 0); } 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0); } }
    @keyframes pulse-high { 0% { box-shadow: 0 0 0 0 rgba(240, 173, 78, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(240, 173, 78, 0); } 100% { box-shadow: 0 0 0 0 rgba(240, 173, 78, 0); } }
    @keyframes pulse-med { 0% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(88, 166, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0); } }
    @keyframes pulse-low { 0% { box-shadow: 0 0 0 0 rgba(139, 148, 158, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(139, 148, 158, 0); } 100% { box-shadow: 0 0 0 0 rgba(139, 148, 158, 0); } }

    /* Custom Leaflet Popup Styling to match Cyberpunk Theme */
    .leaflet-popup-content-wrapper {
        background: var(--card-bg);
        color: var(--text-main);
        border: 1px solid var(--card-border);
        border-radius: 4px;
    }
    .leaflet-popup-tip {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
    }
    .popup-title { font-weight: bold; font-family: 'Courier New', monospace; color: var(--accent); margin-bottom: 5px; }
    .popup-detail { font-size: 0.9em; margin-bottom: 3px; }
    .sev-text-critical { color: #f85149; font-weight: bold; }
    .sev-text-high { color: #f0ad4e; font-weight: bold; }
    .sev-text-medium { color: #58a6ff; font-weight: bold; }
    .sev-text-low { color: #8b949e; font-weight: bold; }
</style>

<div class="dashboard-layout" style="display: block;">
    <div class="card">
        <div class="card-header-title" style="display: flex; justify-content: space-between; align-items: center;">
            <span><i class="fas fa-globe-americas"></i> Global Threat Map</span>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9em;">Visualizing the physical locations of your active targets and their security posture.</p>
        
        <div class="threat-map-container">
            <div id="map"></div>
        </div>
    </div>
</div>

{{ map_data_json|json_script:"map-data" }}

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize Map
        const map = L.map('map').setView([20.0, 0.0], 2); // Center of the world, zoomed out
        
        // CartoDB Dark Matter Tile Layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Parse JSON Data from Django
        const mapData = JSON.parse(document.getElementById('map-data').textContent);
        
        // Plot Markers
        mapData.forEach(target => {
            if (target.lat && target.lon) {
                // Determine pulse class based on max severity
                let pulseClass = 'pulse-low';
                let textClass = 'sev-text-low';
                if (target.max_severity === 'Critical') { pulseClass = 'pulse-critical'; textClass = 'sev-text-critical'; }
                else if (target.max_severity === 'High') { pulseClass = 'pulse-high'; textClass = 'sev-text-high'; }
                else if (target.max_severity === 'Medium') { pulseClass = 'pulse-medium'; textClass = 'sev-text-medium'; }

                // Create custom DivIcon
                const customIcon = L.divIcon({
                    className: `pulse-marker ${pulseClass}`,
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });

                // Popup content
                const popupContent = `
                    <div class="popup-title">${target.url}</div>
                    <div class="popup-detail"><strong>IP:</strong> ${target.ip}</div>
                    <div class="popup-detail"><strong>Vulnerabilities:</strong> ${target.vuln_count}</div>
                    <div class="popup-detail"><strong>Max Severity:</strong> <span class="${textClass}">${target.max_severity}</span></div>
                `;

                L.marker([target.lat, target.lon], { icon: customIcon })
                    .addTo(map)
                    .bindPopup(popupContent);
            }
        });
    });
</script>
{% endblock %}
