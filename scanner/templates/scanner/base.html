{% load static %}
<!DOCTYPE html>
<html lang="en">
<!-- In templates/scanner/base.html -->
<head>
    <meta charset="UTF-8">
    <title>{% block title %}API Sentinel{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- --- THIS IS THE CORRECTED LINK --- -->
    <link rel="stylesheet" type="text/css" href="{% static 'scanner/style.css' %}">
    
</head>

<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>API SENTINEL</h2>
            </div>
        <!-- In base.html -->
<ul class="sidebar-menu">
    <li class="{% if request.path == '/' %}active{% endif %}">
        <a href="{% url 'dashboard' %}">Dashboard</a>
    </li>
    <li class="{% if request.path == '/scan/' %}active{% endif %}">
        <a href="{% url 'new_scan' %}">New Scan</a>
    </li>
    <!-- --- UPDATE THIS LINK --- -->
    <li class="{% if request.path == '/history/' %}active{% endif %}">
        <a href="{% url 'scan_history' %}">Scan History</a>
    </li>
    <li><a href="#">Settings</a></li> <!-- Settings is still a placeholder -->
</ul>

        </nav>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
