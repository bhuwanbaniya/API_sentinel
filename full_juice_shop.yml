openapi: 3.0.0
info:
  title: OWASP Juice Shop Full Attack Surface
  version: "1.0.0"
servers:
  - url: http://localhost:3000
paths:
  /rest/user/login:
    post:
      summary: User Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
  /api/Users/{id}:
    get:
      summary: Fetch User by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /api/Products/{id}:
    get:
      summary: Fetch Product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /api/Feedbacks:
    get:
      summary: Retrieve all feedback
      responses:
        '200':
          description: OK
